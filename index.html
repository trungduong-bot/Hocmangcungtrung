<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khảo Sát Đồng Bộ Google Sheets</title>
    <style>
        :root {
            --primary-color: #4a90e2;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .survey-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
        }

        /* Bảng màu có sẵn */
        .color-palette {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        .color-box {
            height: 45px;
            border-radius: 8px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
        }

        .color-box:hover {
            transform: scale(1.1);
        }

        .color-box.selected {
            border-color: #000;
            transform: scale(1.05);
        }

        /* Chọn màu tự do */
        .picker-group {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 8px;
            border: 1px dashed #ccc;
        }

        input[type="color"] {
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
            background: none;
        }

        /* Nút gửi */
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #357abd;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="survey-container">
    <h2>Khảo Sát Màu Sắc</h2>
    
    <div class="form-group">
        <label for="fullName">Họ và tên của bạn:</label>
        <input type="text" id="fullName" placeholder="Nhập đầy đủ họ và tên..." required>
    </div>

    <div class="form-group">
        <label>Chọn một màu bạn yêu thích:</label>
        <div class="color-palette" id="palette">
            <div class="color-box" style="background-color: #ff4d4d;" data-color="#ff4d4d"></div>
            <div class="color-box" style="background-color: #ff9f43;" data-color="#ff9f43"></div>
            <div class="color-box" style="background-color: #feca57;" data-color="#feca57"></div>
            <div class="color-box" style="background-color: #1dd1a1;" data-color="#1dd1a1"></div>
            <div class="color-box" style="background-color: #54a0ff;" data-color="#54a0ff"></div>
            <div class="color-box" style="background-color: #5f27cd;" data-color="#5f27cd"></div>
            <div class="color-box" style="background-color: #ff9ff3;" data-color="#ff9ff3"></div>
            <div class="color-box" style="background-color: #00d2d3;" data-color="#00d2d3"></div>
            <div class="color-box" style="background-color: #48dbfb;" data-color="#48dbfb"></div>
            <div class="color-box" style="background-color: #341f97;" data-color="#341f97"></div>
        </div>
    </div>

    <div class="form-group">
        <label>Hoặc tự chỉnh màu tùy ý:</label>
        <div class="picker-group">
            <input type="color" id="customColor" value="#4a90e2">
            <span id="colorHexText">Mã màu đang chọn: #4A90E2</span>
        </div>
    </div>

    <button id="btnSubmit" onclick="submitSurvey()">Gửi Khảo Sát</button>
</div>

<script>
    // === ĐƯỜNG DẪN API GOOGLE SHEET CỦA BẠN ===
    const GOOGLE_SHEET_API_URL = "DÁN_URL_CỦA_BẠN_VÀO_ĐÂY"; 

    let selectedColor = "#4a90e2"; 
    const colorBoxes = document.querySelectorAll('.color-box');
    const customColorInput = document.getElementById('customColor');
    const colorHexText = document.getElementById('colorHexText');
    const fullNameInput = document.getElementById('fullName');
    const btnSubmit = document.getElementById('btnSubmit');

    // Sự kiện click bảng màu gợi ý
    colorBoxes.forEach(box => {
        box.addEventListener('click', function() {
            colorBoxes.forEach(b => b.classList.remove('selected'));
            this.classList.add('selected');
            selectedColor = this.getAttribute('data-color');
            
            customColorInput.value = selectedColor;
            colorHexText.innerText = `Mã màu đang chọn: ${selectedColor.toUpperCase()}`;
        });
    });

    // Sự kiện thay đổi bộ chọn màu tự do
    customColorInput.addEventListener('input', function() {
        colorBoxes.forEach(b => b.classList.remove('selected'));
        selectedColor = this.value;
        colorHexText.innerText = `Mã màu đang chọn: ${selectedColor.toUpperCase()}`;
    });

    // Gửi dữ liệu trực tiếp sang Google Sheets
    function submitSurvey() {
        const name = fullNameInput.value.trim();
        
        if (!name) {
            alert("Vui lòng điền họ và tên trước khi gửi!");
            fullNameInput.focus();
            return;
        }

        if (GOOGLE_SHEET_API_URL === "https://script.google.com/macros/s/AKfycbyMQpBrHZPqCPpP5y5Tw82irkHvZuQc0c1QlOIh7ivfebHoBAvte9dEQH9brGklywS1/exec") {
            alert("Vui lòng cấu hình GOOGLE_SHEET_API_URL trong mã nguồn trước khi gửi.");
            return;
        }

        // Vô hiệu hóa nút bấm để tránh click liên tục
        btnSubmit.disabled = true;z
        btnSubmit.innerText = "Đang gửi dữ liệu...";

        const payload = {
            fullName: name,
            colorCode: selectedColor.toUpperCase()
        };

        // Dùng Fetch API để bắn dữ liệu qua phương thức POST ẩn sang Google Apps Script
        fetch(GOOGLE_SHEET_API_URL, {
            method: 'POST',
            mode: 'no-cors', // Sử dụng chế độ no-cors để tránh lỗi bảo mật chéo trang (CORS)
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        })
        .then(() => {
            alert("Cảm ơn bạn! Thông tin đã được lưu trực tiếp vào Google Sheets.");
            fullNameInput.value = "";
            
            // Khôi phục nút bấm
            btnSubmit.disabled = false;
            btnSubmit.innerText = "Gửi Khảo Sát";
        })
        .catch(error => {
            console.error("Lỗi:", error);
            alert("Đã xảy ra lỗi khi đồng bộ dữ liệu.");
            btnSubmit.disabled = false;
            btnSubmit.innerText = "Gửi Khảo Sát";
        });
    }
</script>

</body>
</html>
