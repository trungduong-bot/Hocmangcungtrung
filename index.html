<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khảo Sát Chọn Màu Sắc trực tuyến</title>
    <style>
        :root {
            --primary-color: #4a90e2;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .survey-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #444;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(74, 144, 226, 0.3);
        }

        /* Bảng màu có sẵn */
        .color-palette {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }

        .color-box {
            height: 45px;
            border-radius: 8px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
        }

        .color-box:hover {
            transform: scale(1.1);
        }

        .color-box.selected {
            border-color: #222;
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        /* Chọn màu tự do */
        .picker-group {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            border: 1px dashed #ccc;
        }

        input[type="color"] {
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
            background: none;
        }

        #colorHexText {
            font-size: 14px;
            color: #555;
            font-family: monospace;
            font-weight: bold;
        }

        /* Nút gửi */
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #357abd;
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="survey-container">
    <h2>Khảo Sát Màu Sắc</h2>
    
    <div class="form-group">
        <label for="fullName">Họ và tên của bạn:</label>
        <input type="text" id="fullName" placeholder="Nhập đầy đủ họ và tên..." required autocomplete="off">
    </div>

    <div class="form-group">
        <label>Chọn một tông màu yêu thích:</label>
        <div class="color-palette" id="palette">
            <div class="color-box" style="background-color: #ff4d4d;" data-color="#ff4d4d"></div>
            <div class="color-box" style="background-color: #ff9f43;" data-color="#ff9f43"></div>
            <div class="color-box" style="background-color: #feca57;" data-color="#feca57"></div>
            <div class="color-box" style="background-color: #1dd1a1;" data-color="#1dd1a1"></div>
            <div class="color-box" style="background-color: #54a0ff;" data-color="#54a0ff"></div>
            <div class="color-box" style="background-color: #5f27cd;" data-color="#5f27cd"></div>
            <div class="color-box" style="background-color: #ff9ff3;" data-color="#ff9ff3"></div>
            <div class="color-box" style="background-color: #00d2d3;" data-color="#00d2d3"></div>
            <div class="color-box" style="background-color: #48dbfb;" data-color="#48dbfb"></div>
            <div class="color-box" style="background-color: #341f97;" data-color="#341f97"></div>
        </div>
    </div>

    <div class="form-group">
        <label>Hoặc tự phối màu tùy chỉnh:</label>
        <div class="picker-group">
            <input type="color" id="customColor" value="#4a90e2">
            <span id="colorHexText">MÃ MÀU: #4A90E2</span>
        </div>
    </div>

    <button id="btnSubmit" onclick="submitSurvey()">Gửi Khảo Sát</button>
</div>

<script>
    // =========================================================
    // ⚠️ CHÚ Ý: DÁN LINK WEB APP CỦA BẠN VÀO GIỮA HAI DẤU NHÁY DƯỚI ĐÂY
    const GOOGLE_SHEET_API_URL = "https://script.google.com/macros/s/AKfycbzpD6gj8USYae85Riw1_H5AdEBq4AqXsRFr-jyGYBPpjTSRLHVx1jL8Q6xgSMBttjRG/exec"; 
    // =========================================================

    let selectedColor = "#4a90e2"; 
    const colorBoxes = document.querySelectorAll('.color-box');
    const customColorInput = document.getElementById('customColor');
    const colorHexText = document.getElementById('colorHexText');
    const fullNameInput = document.getElementById('fullName');
    const btnSubmit = document.getElementById('btnSubmit');

    // Click chọn các ô màu có sẵn
    colorBoxes.forEach(box => {
        box.addEventListener('click', function() {
            colorBoxes.forEach(b => b.classList.remove('selected'));
            this.classList.add('selected');
            selectedColor = this.getAttribute('data-color');
            
            customColorInput.value = selectedColor;
            colorHexText.innerText = `MÃ MÀU: ${selectedColor.toUpperCase()}`;
        });
    });

    // Thay đổi màu ở Color Picker
    customColorInput.addEventListener('input', function() {
        colorBoxes.forEach(b => b.classList.remove('selected'));
        selectedColor = this.value;
        colorHexText.innerText = `MÃ MÀU: ${selectedColor.toUpperCase()}`;
    });

    // Hàm gửi dữ liệu lên Google Sheets
    function submitSurvey() {
        const name = fullNameInput.value.trim();
        
        if (!name) {
            alert("Vui lòng điền họ và tên trước khi gửi!");
            fullNameInput.focus();
            return;
        }

        if (GOOGLE_SHEET_API_URL.includes("DÁN_URL_CỦA_BẠN_VÀO_ĐÂY")) {
            alert("Lỗi: Bạn chưa cấu hình GOOGLE_SHEET_API_URL ở dòng 175.");
            return;
        }

        // Vô hiệu hóa nút để tránh gửi trùng lặp
        btnSubmit.disabled = true;
        btnSubmit.innerText = "Đang gửi dữ liệu lên Google Sheet...";

        // Chuyển dữ liệu sang URL Encoded (Đảm bảo hoạt động 100% offline file:///)
        const formData = new URLSearchParams();
        formData.append('fullName', name);
        formData.append('colorCode', selectedColor.toUpperCase());

        fetch(GOOGLE_SHEET_API_URL, {
            method: 'POST',
            mode: 'no-cors', // Sử dụng chế độ này giúp bỏ qua mọi giới hạn CORS từ trình duyệt
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded'
            },
            body: formData.toString()
        })
        .then(() => {
            alert("Gửi thành công! Dữ liệu đã được ghi nhận vào Google Sheet của bạn.");
            
            // Reset form
            fullNameInput.value = "";
            btnSubmit.disabled = false;
            btnSubmit.innerText = "Gửi Khảo Sát";
        })
        .catch(error => {
            console.error("Lỗi gửi dữ liệu:", error);
            alert("Gửi thất bại! Hãy kiểm tra kết nối mạng hoặc link Google App Script.");
            btnSubmit.disabled = false;
            btnSubmit.innerText = "Gửi Khảo Sát";
        });
    }
</script>

</body>
</html>
